<div class="dashboard-wrapper">
  <header class="header">
    <div class="header-main">
      <div class="header-info">
        <h1 class="header-title">{{ title }}</h1>
        <p class="header-subtitle">{{ subtitle }}</p>
      </div>
      <button mat-icon-button class="logout-btn" (click)="logout()" aria-label="Logout">
        <mat-icon class="logout-icon">logout</mat-icon>
      </button>
    </div>
  </header>

  <main class="content-container">
    <section class="section">
      <h2 class="section-title">Overview</h2>
      <div class="overview-grid">
        <mat-card class="stat-card" *ngFor="let stat of stats">
          <mat-card-content class="stat-content">
            <div
              class="icon-circle"
              [style.backgroundColor]="stat.bgColor"
              [style.color]="stat.iconColor"
            >
              <mat-icon class="stat-icon-img">{{ stat.icon }}</mat-icon>
            </div>
            <div class="stat-value">{{ stat.value }}</div>
            <div class="stat-label">{{ stat.title }}</div>
          </mat-card-content>
        </mat-card>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Quick Actions</h2>
      <div class="actions-container">
        <a
          *ngFor="let action of quickActions"
          [routerLink]="action.route"
          class="action-link"
          matRipple
          [matRippleColor]="'rgba(0, 0, 0, 0.05)'"
        >
          <mat-card class="action-card">
            <mat-card-content class="action-content">
              <div class="action-left">
                <mat-icon class="action-icon">{{ action.icon }}</mat-icon>
                <span class="action-label">{{ action.label }}</span>
              </div>
              <mat-icon class="chevron-icon">chevron_right</mat-icon>
            </mat-card-content>
          </mat-card>
        </a>
      </div>
    </section>
  </main>
</div>
