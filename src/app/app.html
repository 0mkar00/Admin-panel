<div class="login-outlet-wrapper" *ngIf="isLoginPage; else layout">
  <router-outlet></router-outlet>
</div>

<ng-template #layout>
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile" class="sidebar">
      <div class="sidebar-header">
        <mat-icon class="logo-icon">shield</mat-icon>
        <span class="logo-text">Admin Panel</span>
      </div>

      <nav class="nav-links">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-link"
          (click)="isMobile ? sidenav.close() : null"
        >
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </nav>

      <div class="profile-card" [matMenuTriggerFor]="adminMenu">
        <div class="profile-avatar">
          <mat-icon class="avatar-icon">person</mat-icon>
        </div>
        <div class="profile-info">
          <span class="profile-name">Admin</span>
          <span class="profile-role">Administrator</span>
        </div>
        <mat-icon class="arrow-down">keyboard_arrow_down</mat-icon>
      </div>

      <mat-menu
        #adminMenu="matMenu"
        xPosition="after"
        yPosition="above"
        class="profile-dropdown-panel"
      >
        <button mat-menu-item class="menu-item-action">
          <mat-icon>person</mat-icon>
          <span>My Profile</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item class="menu-item-action logout-item" (click)="logout()">
          <mat-icon class="logout-icon">logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-sidenav>

    <mat-sidenav-content class="main-content">
      <div class="mobile-topbar" *ngIf="isMobile">
        <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle navigation">
          <mat-icon>menu</mat-icon>
        </button>
        <span class="topbar-title">Admin Panel</span>
      </div>

      <div class="content-body">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</ng-template>
